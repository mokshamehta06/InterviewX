<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Companies - InterviewIQ</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="top-header" id="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1 class="page-title">Search Companies</h1>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </header>

    <main class="main-content">
      <!-- Search Section -->
      <div style="text-align: center; margin-bottom: 40px;">
        <h2 style="font-size: 1.5rem; margin-bottom: 8px;">Find Your Target Company</h2>
        <p class="text-muted" style="margin-bottom: 24px;">Search any company to get interview questions, patterns, and AI analysis</p>
        
        <div class="search-container" id="search-container">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-bar" id="company-search" 
                 placeholder="Search company... (e.g., TCS, Amazon, Google)" 
                 autocomplete="off">
          <div class="search-dropdown" id="search-dropdown"></div>
        </div>
      </div>

      <!-- Recent Searches -->
      <div class="card mb-24" id="recent-section">
        <div class="card-header">
          <div class="card-title">🕐 Recent Searches</div>
        </div>
        <div id="recent-searches" style="display: flex; gap: 8px; flex-wrap: wrap;">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Popular Companies -->
      <div>
        <h3 style="margin-bottom: 16px;">🔥 Popular Companies</h3>
        <div class="company-grid" id="popular-grid">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- All Companies -->
      <div class="mt-24">
        <h3 style="margin-bottom: 16px;">📋 All Companies</h3>
        <div class="company-grid" id="all-companies-grid">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
