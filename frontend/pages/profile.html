<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - InterviewIQ</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="top-header" id="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1 class="page-title">My Profile</h1>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </header>

    <main class="main-content">
      <div style="max-width: 600px;">
        <!-- Profile Info -->
        <div class="card mb-24">
          <div class="card-header">
            <div class="card-title">👤 Profile Information</div>
          </div>
          <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 24px;">
            <div class="user-avatar" style="width: 64px; height: 64px; font-size: 1.4rem;" id="profile-avatar">--</div>
            <div>
              <h3 id="profile-name">Loading...</h3>
              <p class="text-muted text-sm" id="profile-email">--</p>
              <span class="badge badge-primary" id="profile-role">--</span>
            </div>
          </div>

          <form id="profile-form">
            <div class="form-group">
              <label class="form-label" for="edit-name">Name</label>
              <input type="text" id="edit-name" class="form-input" placeholder="Your name">
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <!-- Change Password -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">🔒 Change Password</div>
          </div>
          <form id="password-form">
            <div class="form-group">
              <label class="form-label" for="current-password">Current Password</label>
              <input type="password" id="current-password" class="form-input" placeholder="Current password" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">New Password</label>
              <input type="password" id="new-password" class="form-input" placeholder="New password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
