<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - InterviewIQ</title>
  <meta name="description" content="Login to InterviewIQ to access company-specific interview preparation tools.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">IQ</div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to continue your preparation</p>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <div id="login-error" class="form-error" style="display:none; margin-bottom: 12px;"></div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="login-btn">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/pages/register.html">Create one</a>
      </div>

      <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center;">
        <p class="text-xs text-muted mb-8">Demo Credentials</p>
        <div style="display: flex; gap: 8px; justify-content: center;">
          <button class="btn btn-secondary btn-sm" onclick="fillDemo('admin')">Admin Login</button>
          <button class="btn btn-secondary btn-sm" onclick="fillDemo('student')">Student Login</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
