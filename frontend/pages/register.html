<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - InterviewIQ</title>
  <meta name="description" content="Create your InterviewIQ account to start preparing for placement interviews.">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">IQ</div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Start your placement preparation journey</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input type="password" id="reg-password" class="form-input" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">Confirm Password</label>
          <input type="password" id="reg-confirm" class="form-input" placeholder="Re-enter password" required>
        </div>
        <div id="register-error" class="form-error" style="display:none; margin-bottom: 12px;"></div>
        <button type="submit" class="btn btn-primary w-full btn-lg" id="register-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Login here</a>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
