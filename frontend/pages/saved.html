<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Questions - InterviewIQ</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="top-header" id="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <h1 class="page-title">Saved Questions</h1>
      </div>
      <div class="header-right">
        <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </header>

    <main class="main-content">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="saved-q">Saved Questions</button>
        <button class="tab" data-tab="bookmarks">Bookmarks</button>
      </div>

      <!-- Saved Questions Tab -->
      <div class="tab-content active" id="tab-saved-q">
        <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
          <select class="form-select" id="filter-status" style="width: auto; min-width: 150px;">
            <option value="">All Status</option>
            <option value="unsolved">Unsolved</option>
            <option value="attempted">Attempted</option>
            <option value="solved">Solved</option>
          </select>
        </div>
        <div id="saved-questions-list">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Bookmarks Tab -->
      <div class="tab-content" id="tab-bookmarks">
        <div id="bookmarks-list">
          <div class="loading-overlay"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/saved.js"></script>
</body>
</html>
